spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: servicemanagement
  datasource:
    url: jdbc:postgresql://${PGHOST}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

logging:
  level:
    org.flywaydb: DEBUG

api:
  security:
    token:
      secret: ${APIKEY}